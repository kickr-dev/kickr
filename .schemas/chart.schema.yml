# yaml-language-server: $schema=https://json-schema.org/draft/2020-12/schema

$schema: https://json-schema.org/draft/2020-12/schema
$id: https://raw.githubusercontent.com/kickr-dev/kickr/main/.schemas/chart.schema.json

title: Helm values for kickr
description: Helm values overrides for kickr chart file

type: object
additionalProperties: false

$defs:
  dependency:
    type: object
    additionalProperties: false
    descriptions: >-
      Dependency represents the configuration of a given helm chart dependency.
      It's a simplified configuration.
    required:
      - name
      - version
      - repository
    properties:
      name:
        $ref: https://json.schemastore.org/chart.json#/properties/dependencies/items/properties/name
      version:
        $ref: https://json.schemastore.org/chart.json#/properties/dependencies/items/properties/version
      repository:
        $ref: https://json.schemastore.org/chart.json#/properties/dependencies/items/properties/repository
      values:
        type: object
        additionalProperties: true
        descriptions: Values is the configuration to override the dependency values.

  serviceAccount:
    type: object
    additionalProperties: false
    descriptions: >-
      ServiceAccount binds together: * a name, understood by users, and perhaps
      by peripheral systems, for an identity * a principal that can be
      authenticated and authorized * a set of secrets
    properties:
      create:
        description: Enable or disable the service account creation. By default its false.
        type: boolean
        default: false
      annotations:
        $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.apimachinery.pkg.apis.meta.v1.ObjectMeta/properties/annotations
      name:
        description: The service account name. By default its empty.
        type: string
        default: ""

  image:
    type: object
    additionalProperties: false
    description: Image is the configuration for the container image pull (image name, registry, policy, tag/version).
    properties:
      registry:
        description: >-
          Registry is the target docker registry where the docker image is
          saved. By default its empty, redirecting to docker.io.
        type: string
        default: ""
      repository:
        description: >-
          Repository is the target repository or docker image name (without its
          tag). Its prefixed with the registry in deployments configuration.
        type: string
      pullPolicy:
        $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.core.v1.Container/properties/imagePullPolicy
      tag:
        description: >-
          Tag is the specific tag to use for the given repository image. By
          default its empty (meaning the helm chart AppVersion).
        type: string
        default: ""

  configMap:
    type: object
    additionalProperties: false
    description: ConfigMap holds configuration data for pods to consume.
    required:
      - mountPath
    properties:
      mountPath:
        description: >-
          MountPath is the target path where the configmap will be mount in the
          pod container.
        type: string
      tpl_folders:
        description: >-
          All files provided in those folders will be evaluated with tpl (helm
          feature) to replace like values template properties or even functions.
          They will additionally be put into given configmap.
        type: array
        items:
          type: string
      include_folders:
        description: All files provided in those folders will be put into given configmap.
        type: array
        items:
          type: string
      data:
        type: object
        additionalProperties: true
        description: >-
          Data is a simple way to add files in given configmap without going
          through the creation of files in chart folder.

  resource:
    type: object
    description: Resource represents a shared configuration for all workers, cronjobs and jobs.
    properties:
      image:
        $ref: "#/$defs/image"
      env:
        $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.core.v1.Container/properties/env
      envFrom:
        $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.core.v1.Container/properties/envFrom
      resources:
        $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.core.v1.Container/properties/resources
      restartPolicy:
        $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.core.v1.PodSpec/properties/restartPolicy
      configMap:
        $ref: "#/$defs/configMap"
      volumes:
        $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.core.v1.PodSpec/properties/volumes
      volumeMounts:
        $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.core.v1.Container/properties/volumeMounts
      podAnnotations:
        $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.apimachinery.pkg.apis.meta.v1.ObjectMeta/properties/annotations
      podSecurityContext:
        $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.core.v1.PodSpec/properties/securityContext
      securityContext:
        $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.core.v1.Container/properties/securityContext
      nodeSelector:
        $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.core.v1.PodSpec/properties/nodeSelector
      tolerations:
        $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.core.v1.PodSpec/properties/tolerations
      affinity:
        $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.core.v1.PodSpec/properties/affinity

  cronjob:
    type: object
    description: CronJob represents the configuration of a single cron job.
    allOf:
      - $ref: "#/$defs/resource"
      - properties:
          suspend:
            $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.batch.v1.CronJobSpec/properties/suspend
          schedule:
            $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.batch.v1.CronJobSpec/properties/schedule
          concurrencyPolicy:
            $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.batch.v1.CronJobSpec/properties/concurrencyPolicy
          completionMode:
            $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.batch.v1.JobSpec/properties/completionMode
          completions:
            $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.batch.v1.JobSpec/properties/completions
          parallelism:
            $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.batch.v1.JobSpec/properties/parallelism
          failedJobsHistoryLimit:
            $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.batch.v1.CronJobSpec/properties/failedJobsHistoryLimit
          successfulJobsHistoryLimit:
            $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.batch.v1.CronJobSpec/properties/successfulJobsHistoryLimit

  job:
    type: object
    description: Job represents the configuration of a single job.
    allOf:
      - $ref: "#/$defs/resource"
      - properties:
          suspend:
            $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.batch.v1.CronJobSpec/properties/suspend
          completionMode:
            $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.batch.v1.JobSpec/properties/completionMode
          completions:
            $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.batch.v1.JobSpec/properties/completions
          parallelism:
            $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.batch.v1.JobSpec/properties/parallelism
          ttlSecondsAfterFinished:
            $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.batch.v1.JobSpec/properties/ttlSecondsAfterFinished

  worker:
    type: object
    description: Deployment enables declarative updates for Pods and ReplicaSets.
    allOf:
      - $ref: "#/$defs/resource"
      - properties:
          paused:
            $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.apps.v1.DeploymentSpec/properties/paused
          replicaCount:
            $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.apps.v1.DeploymentSpec/properties/replicas
          livenessProbe:
            $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.core.v1.Container/properties/livenessProbe
          readinessProbe:
            $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.core.v1.Container/properties/readinessProbe
          startupProbe:
            $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.core.v1.Container/properties/startupProbe
          autoscaling:
            $ref: "#/$defs/hpa"

  hpa:
    type: object
    additionalProperties: false
    description: >-
      HorizontalPodAutoscaler is the configuration for a horizontal pod
      autoscaler, which automatically manages the replica count of any resource
      implementing the scale subresource based on the metrics specified.
    properties:
      enabled:
        description: Enable or disable the HPA configuration. By default HorizontalPodAutoscaler is disabled.
        type: boolean
        default: false
      minReplicas:
        $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.autoscaling.v2.HorizontalPodAutoscalerSpec/properties/minReplicas
      maxReplicas:
        $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.autoscaling.v2.HorizontalPodAutoscalerSpec/properties/maxReplicas
      metrics:
        $ref: https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.autoscaling.v2.HorizontalPodAutoscalerSpec/properties/metrics

properties:
  description:
    $ref: https://json.schemastore.org/chart.json#/properties/description

  dependencies:
    type: array
    description: >-
      In Helm, one chart may depend on any number of other charts. These
      dependencies can be dynamically linked using the dependencies field in
      Chart.yaml or brought in to the charts/ directory and managed manually.

      The charts required by the current chart are defined as a list in the
      dependencies field.
    items:
      $ref: "#/$defs/dependency"

  maintainers:
    $ref: https://json.schemastore.org/chart.json#/properties/maintainers

  imagePullSecrets:
    $ref: s://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.4/_definitions.json#/definitions/io.k8s.api.core.v1.PodSpec/properties/imagePullSecrets

  nameOverride:
    type: string

  fullnameOverride:
    type: string

  serviceAccount:
    $ref: "#/$defs/serviceAccount"

  crons:
    type: object
    description: >-
      In kubernetes, a cronjob is an executable resource given by its schedule
      property. Its possible to define an ensemble of cronjobs.
    additionalProperties:
      type: object
      $ref: "#/$defs/cronjob"

  jobs:
    type: object
    description: >-
      In kubernetes, a job represents an executable resource, its commonly
      executed when an helm chart is deployed for instance to initialize some
      global configuration (wide concept).
    additionalProperties:
      type: object
      $ref: "#/$defs/job"

  workers:
    type: object
    description: >-
      Workers is an ensemble of simplified kubernetes deployments. Meaning that
      a worker is a resource continuously running and only stop when a upgrade
      occurs.
    additionalProperties:
      type: object
      $ref: "#/$defs/worker"
