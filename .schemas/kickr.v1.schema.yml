# yaml-language-server: $schema=https://json-schema.org/draft/2020-12/schema

$schema: https://json-schema.org/draft/2020-12/schema
$id: https://raw.githubusercontent.com/kickr-dev/kickr/beta/.schemas/kickr.v1.schema.yaml

title: Kickr configuration
description: Kickr configuration file (https://github.com/kickr-dev/kickr)

type: object
additionalProperties: false

required:
  - maintainers
  - version

properties:
  version:
    type: integer
    const: 1

  description:
    type: string
    description: description is a free-form text that may be used in various cases like in the Helm chart, the Dockerfile, etc.
    examples:
      - useful description

  ci:
    type: object
    additionalProperties: false
    required:
      - provider
    properties:
      provider:
        type: string
        enum:
          - github
          - gitlab
      options:
        description:
          options to add for CI/CD generation.

          Those are various and may differ depending on used CI/CD provider.
      docker:
        $ref: "#/$defs/docker"
      helm:
        $ref: "#/$defs/helm"
      release:
        $ref: "#/$defs/release"
      website:
        $ref: "#/$defs/website"
      renovate:
        type:
          - "null"
          - object
        additionalProperties: false
        description: |
          renovate configuration in Continuous Integration.

          This section can only be provided when 'dependencies.manager' is 'renovate'.

          There's two possibility:
            - with GitLab CI/CD, only 'renovate' can be provided (a simple string) to indicate that the project must generated Renovate CI/CD jobs / steps.
            - with GitHub Actions, 'renovate' (simple string), 'renovate:' (empty object) or the whole object can be given, since 'auth' may or may not be provided.
        properties:
          auth:
            type: string
            enum:
              - github-app
              - github-token
              - personal-token
            description: |
              auth corresponds to the authentication method used by Renovate when running in self-hosted mode.

              Since GitLab provides features around tokens, this property cannot be given when running with it (i.e. will always be 'personal-token').
    allOf:
      # specific rules for GitLab CI/CD
      - if:
          properties:
            provider:
              const: gitlab
        then:
          properties:
            # don't allow GitLab CI/CD to provide 'auth' in release section
            release:
              properties:
                auth: false
            # don't allow GitLab CI/CD to provide 'deploy' in helm section
            helm:
              properties:
                deploy: false
            # don't allow GitLab CI/CD to provide 'auth' renovate section
            renovate:
              properties:
                auth: false
            # only allow specific options with GitLab CI/CD
            options:
              type: array
              items:
                type: string
                enum:
                  - sonarqube
      # specific rules for GitHub Actions
      - if:
          properties:
            provider:
              const: github
        then:
          properties:
            # allow specific options with GitHub Actions
            options:
              type: array
              items:
                type: string
                enum:
                  - codecov
                  - codeql
                  - harden-runner
                  - labeler
                  - ossf-scorecard
                  - sonarqube
                  - step-security-actions
      # force with GitHub the presence of 'release.auth' when 'release' is provided
      - if:
          properties:
            provider:
              const: github
          required:
            - release
        then:
          properties:
            release:
              required:
                - auth
      # force with GitHub the presence of 'renovate.auth' when 'renovate' is provided
      - if:
          properties:
            provider:
              const: github
          required:
            - renovate
        then:
          properties:
            renovate:
              required:
                - auth

  dependencies:
    type: object
    additionalProperties: false
    required:
      - manager
    properties:
      manager:
        type: string
        enum:
          - dependabot
          - renovate
      local:
        type: string
        description: local (in the repository) renovate configuration path to use in global extends.
        examples:
          - configs/renovate.json5
          - configs/renovate.local.json5
    allOf:
      - if:
          properties:
            manager:
              const: dependabot
        then:
          properties:
            local: false

  exclude:
    type: array
    items:
      type: string
      enum:
        - goreleaser
        - makefile
        - pre-commit
        - shell

  license:
    type: string
    enum: [ agpl-3.0, apache-2.0, bsd-2-clause, bsd-3-clause, bsl-1.0, cc0-1.0, epl-2.0, gpl-2.0, gpl-3.0, lgpl-2.1, mit, mpl-2.0, unlicense ]
    description: |
      license can be one of the available options with GitLab license API.

      With this property, kickr will automatically download the appropriate license file and save it in the project.

  maintainers:
    type: array
    minItems: 1
    description: |
      maintainers defines the list of project maintainers.

      When using kickr, at least one maintainer must be given.
      Maintainers may be used in various places like in the Helm chart, Dockerfile, Goreleaser configuration, etc.
    items:
      type: object
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
          examples:
            - maintainer
        email:
          type: string
          format: email
          examples:
            - maintainer@example.com
        url:
          type: string
          format: uri
          examples:
            - maintainer.example.com

  platform:
    type: string
    enum:
      - bitbucket
      - gitea
      - github
      - gitlab
    description: |
      platform defines the source code hosting platform (GitHub, GitLab, Gitea, Bitbucket).

      By default, it will be guessed based on Git remote URL.
      However, in case of mirroring, or other specific cases (like custom hosting), it may be updated (and it won't be overridden) to provide a custom platform.

      The platform serves in various cases to generate the right files format (dependabot for instance) but also for badges in README.md.

  pre-commit:
    type: array
    description: |
      pre-commit section can be provided to add additional, non-default, checks with pre-commit.

      All options available here are implemented in kickr templates, there's no possibly to directly give pre-commit hooks definition.

      In case a specific hook, not implemented, must be provided, then '.pre-commit-config.yaml' file can be modified
      and the top comment indicating that it's generated can be removed to avoid being overridden.
    items:
      type: string
      enum:
        - auto-commit
        - golangci-lint
        - gomod-tidy

$defs:
  docker:
    title: Docker
    type: object
    additionalProperties: false
    properties:
      auto:
        type: boolean
      path:
        type: string
        examples:
          - kickr-dev/kickr
      port:
        type: integer
        examples:
          - 3000
      registry:
        type: string
        examples:
          - ghcr.io

  helm:
    title: Helm
    type: object
    additionalProperties: false
    properties:
      deploy:
        type: string
        description: deploy helm chart to kubernetes cluster(s).
        default: none
        enum:
          - auto
          - manual
          - none
      environments:
        type: array
        description: |
          environments to associate a specific Kubernetes context to a branch.

          Only those four environments can be provided, defining under the hood specific behaviors (for GitHub Actions):
            - 'review' will only be run on non-protected branches
            - 'integration' will only be run on protected
            - 'staging' will only be run on the default branch
            - 'production' will only be run on the default branch

          Concerning GitLab CI/CD, rules can be found at https://gitlab.com/to-be-continuous/helm#managed-deployment-environments.
        items:
          type: string
          enum:
            - integration
            - production
            - review
            - staging
      path:
        type: string
        description: path within the helm registry (default is the path on VCS remote URL).
        examples:
          - kickr-dev/kickr
      publish:
        type: string
        description: publish helm chart to the registry.
        default: none
        enum:
          - auto
          - manual
          - none
      registry:
        type: string
        description: |
          registry URL (both OCI and non-OCI based registry are supported).

          Depending on the project registry (GitHub, Jfrog, Nexus, etc.), this property may need a more specific path like 'oci://jfrog.example.com/my/registry'.
        examples:
          - ghcr.io
          - oci://ghcr.io
    dependentRequired:
      registry:
        - path
      publish:
        - path
        - registry
      path:
        - registry

  website:
    title: Static Deployment
    type: object
    additionalProperties: false
    required:
      - hosting
    properties:
      auto:
        type: boolean
      directory:
        type: string
        description: directory where is located the website to deploy (default is '.').
        examples:
          - docs
          - exampleSite
      hosting:
        type: string
        enum:
          - netlify
          - pages

  release:
    title: Release
    type:
      - "null"
      - object
    additionalProperties: false
    properties:
      auth:
        type: string
        enum:
          - github-app
          - github-token
          - personal-token
        description: |
          auth corresponds to the authentication method used by semantic-release when creating GitHub / GitLab releases.

          Since GitLab provides features around tokens, this property cannot be given when running with it (i.e. will always be 'personal-token').
      auto:
        type: boolean
      options:
        type: array
        description: options to add in release job / release configuration.
        items:
          type: string
          enum:
            - backmerge

allOf:
  # don't allow renovate section in CI/CD when the dependencies manager is not renovate
  - if:
      properties:
        dependencies:
          properties:
            manager:
              const: renovate
    then: {}
    else:
      properties:
        ci:
          properties:
            renovate: false
