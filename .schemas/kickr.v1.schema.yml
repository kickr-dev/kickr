# yaml-language-server: $schema=https://json-schema.org/draft/2020-12/schema

$schema: https://json-schema.org/draft/2020-12/schema
$id: https://raw.githubusercontent.com/kickr-dev/kickr/beta/.schemas/kickr.v1.schema.yaml

title: Kickr configuration
description: Kickr configuration file (https://github.com/kickr-dev/kickr)

type: object
additionalProperties: false

required: [maintainers, version]

properties:
  version:
    type: integer
    description: Kickr schema version
    const: 1

  description:
    type: string
    description: A free-form text that may be used in various cases like in the Helm chart, the Dockerfile, etc.

  docker:
    $ref: "#/$defs/docker"

  exclude:
    type: array
    description: Exclude part of Kickr generation.
    items:
      type: string
      enum: [goreleaser, makefile, pre-commit, renovate, shell]

  github:
    type: object
    description: Enable GitLab Actions with options to tune behaviors.
    additionalProperties: false
    properties:
      options:
        description: Available options to tune GitHub Actions.
        type: array
        items:
          type: string
          enum:
            - codecov
            - codeql
            - harden-runner
            - kickr:github-app
            - kickr:personal-token
            - labeler
            - ossf-scorecard
            - renovate:github-app
            - renovate:personal-token
            - sonarqube
            - step-security-actions
      release:
        unevaluatedProperties: false
        properties:
          auth:
            type: string
            enum: [github-app, github-token, personal-token]
            description: Authentication method to create releases through the current VCS platform API.
        allOf:
          - $ref: "#/$defs/ci/release"

  gitlab:
    type: object
    description: Enable GitLab CICD with options to tune behaviors.
    additionalProperties: false
    properties:
      options:
        description: Available options to GitLab CICD jobs.
        type: array
        items:
          type: string
          enum: [kickr, renovate, sonarqube]
      release:
        additionalProperties: false
        $ref: "#/$defs/ci/release"

  helm:
    $ref: "#/$defs/helm"

  license:
    type: string
    description: Specify the repository license.
    enum: [agpl-3.0, apache-2.0, bsd-2-clause, bsd-3-clause, bsl-1.0, cc0-1.0, epl-2.0, gpl-2.0, gpl-3.0, lgpl-2.1, mit, mpl-2.0, unlicense]

  maintainers:
    type: array
    minItems: 1
    description: Repository's maintainers list. Helps generating various files like CODEOWNERS or Helm Chart maintainers list.
    items:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          description: |-
            Maintainer name or username.
            Username is preferred to be correctly identified within the CODEOWNERS file on the VCS platform.
          examples: [maintainer]
        email:
          type: string
          description: Maintainer email. Only useful to be provided when working with an Helm Chart.
          format: email
          examples: [maintainer@example.com]
        url:
          type: string
          description: Maintainer personal portfolio / URL. Only useful to be provided when working with an Helm Chart.
          format: uri
          examples: [maintainer.example.com]

  platform:
    type: string
    description: |-
      Define the source code hosting platform (GitHub, GitLab, Gitea, Bitbucket).

      By default, it will be guessed based on Git remote URL.
      However, in case of mirroring, or other specific cases (like custom hosting), it may be updated to provide a custom platform.

      Helps generating various files the badges in README.md.
    enum: [bitbucket, gitea, github, gitlab]

  pre-commit:
    type: array
    description: |-
      Section to add additional, non-default, checks with pre-commit.

      All options available here are implemented in Kickr templates, there's no possibly to directly give pre-commit hooks definition.

      In case a specific hook, not implemented, must be provided, then '.pre-commit-config.yaml' file can be modified
      and the top comment indicating that it's generated can be removed to avoid being overridden.
    items:
      type: string
      enum:
        - auto-commit
        - conventional-commits
        - gitflow-branches
        - golangci-lint
        - gomod-tidy
        - terraform

  terraform:
    $ref: "#/$defs/terraform"

  website:
    $ref: "#/$defs/website"

allOf:
  # Enrich multiple objects with their CI properties
  - if:
      required: [github]
    then:
      properties:
        docker:
          unevaluatedProperties: false
          allOf:
            - $ref: "#/$defs/docker"
            - $ref: "#/$defs/ci/docker"
        helm:
          unevaluatedProperties: false
          allOf:
            - $ref: "#/$defs/helm"
            - $ref: "#/$defs/ci/helm"
        terraform:
          unevaluatedProperties: false
          allOf:
            - $ref: "#/$defs/terraform"
            - $ref: "#/$defs/ci/terraform"
        website:
          unevaluatedProperties: false
          allOf:
            - $ref: "#/$defs/website"
            - $ref: "#/$defs/ci/website"
  # Enrich multiple objects with their CI properties
  - if:
      required: [gitlab]
    then:
      properties:
        docker:
          unevaluatedProperties: false
          allOf:
            - $ref: "#/$defs/docker"
            - $ref: "#/$defs/ci/docker"
        helm:
          unevaluatedProperties: false
          allOf:
            - $ref: "#/$defs/helm"
            - $ref: "#/$defs/ci/helm"
        terraform:
          unevaluatedProperties: false
          allOf:
            - $ref: "#/$defs/terraform"
            - $ref: "#/$defs/ci/terraform"
        website:
          unevaluatedProperties: false
          allOf:
            - $ref: "#/$defs/website"
            - $ref: "#/$defs/ci/website"

$defs:
  ##############################################################
  #
  # Base configurations
  #
  ##############################################################
  docker:
    type: object
    description: |-
      General Docker configuration.

      With 'ci' enabled, control where (registry and path) shall the built Docker image be pushed and when (automatically or not).
    properties:
      port:
        type: integer
        description: Port to expose in the Dockerfile.
        examples: [3000]

  helm:
    type: object
    description: |-
      General Helm configuration. By providing this property an Helm Chart will be generated.

      With 'ci' enabled, control how and when shall the Helm Chart be published or deployed alongside on which environments.

  terraform:
    type: object
    description: |-
      Configure the terraform modules and the engine to use (opentofu by default).

      By default, if a module is present at repository's root, then there's no need to provide the list of modules.
      However, if current repository is composed of multiple root modules (in subdirectories),
      then it's required to provide the full list of modules to generate templates correctly.

      With 'ci' enabled, control when shall the terraform modules be applied (or not) and on which environments.
    properties:
      engine:
        type: string
        description: The engine to use to lint, validate, test, apply the resources.
        default: opentofu
        enum: [opentofu, terraform]
      modules:
        type: array
        description: List of terraform / opentofu modules.
        items:
          type: string

  website:
    type: object
    description: |-
      Configure which directory to build (depends on the repository files, a package.json for Node, a go.mod for Hugo)
      and deploy.

      With 'ci' enabled, control where shall the website be deployed (netlify, pages) and when.
    properties:
      directory:
        type: string
        description: Website directory location (default to '.')
        examples: [docs, exampleSite]

  ##############################################################
  #
  # Continuous Integration / Deployment specificities
  #
  ##############################################################
  ci:
    docker:
      type: object
      properties:
        auto:
          type: boolean
          description: Docker push strategy (automatic or not).
        path:
          type: string
          description: Docker image path inside the registry (default is the path on VCS remote URL).
          examples: [kickr-dev/kickr]
        registry:
          type: string
          description: |-
            Docker registry where the image will be pushed.

            By default it's the current VCS registry, i.e. 'ghcr.io' when working with GitHub
            and 'registry.gitlab.com' when working with GitLab.
          examples: [docker.io, ghcr.io, registry.gitlab.com]

    helm:
      type: object
      dependentRequired:
        environments: [deploy]
        deploy: [environments]
        publish: [path, registry]
        path: [registry]
        registry: [path]
      properties:
        deploy:
          type: string
          description: |-
            Helm Chart deployment strategy (automatic or manual).
            Not providing this property will mean 'never' as strategy, no deployment job will be generated.
          enum: [auto, manual]
        environments:
          type: array
          description: |-
            Environments to associate a specific Kubernetes context to a branch.

            Only those four environments can be provided, defining under the hood specific behaviors (for GitHub Actions):
              - 'review' will only be run on non-protected branches
              - 'integration' will only be run on protected
              - 'staging' will only be run on the default branch
              - 'production' will only be run on the default branch

            Concerning GitLab CI/CD, rules can be found at https://gitlab.com/to-be-continuous/helm#managed-deployment-environments.
          items:
            type: string
            enum: [integration, production, review, staging]
            minItems: 1
        path:
          type: string
          description: Path within the helm registry (default is the path on VCS remote URL).
          examples: [kickr-dev/kickr]
        publish:
          type: string
          description: |-
            Helm Chart publishing strategy.
            Not providing this property will mean 'never' as strategy, no publish job will be generated.
          enum: [auto, manual]
        registry:
          type: string
          description: |-
            Registry URL (both OCI and non-OCI based registry are supported).

            Depending on the project registry (GitHub, Jfrog, Nexus, etc.), this property may need a more specific path like 'oci://jfrog.example.com/my/registry'.
          examples: [ghcr.io, oci://ghcr.io]

    terraform:
      type: object
      dependentRequired:
        environments: [apply]
        apply: [environments]
      properties:
        apply:
          type: string
          description: |-
            Apply strategy.
            Not providing this property will mean 'never' as strategy, no apply job will be generated.
          enum: [auto, manual]
        environments:
          type: array
          description: |-
            Environments to associate a specific terraform apply with.

            Only those four environments can be provided, defining under the hood specific behaviors (for GitHub Actions):
              - 'review' will only be run on non-protected branches
              - 'integration' will only be run on protected
              - 'staging' will only be run on the default branch
              - 'production' will only be run on the default branch

            Concerning GitLab CI/CD, rules can be found at https://gitlab.com/to-be-continuous/terraform#global-configuration.
          items:
            type: string
            enum: [integration, production, review, staging]
            minItems: 1

    website:
      type: object
      required: [hosting]
      properties:
        auto:
          type: boolean
          description: Whether the website directory shall be built and deployed automatically (or not) on the hosting platform.
        hosting:
          type: string
          description: Hosting platform for the website.
          enum: [netlify, pages]

    release:
      type: object
      description: |-
        Tune various configuration on the releasing part.
        From automatic releasing to how the authentication should be made with which semantic-release plugins.
      properties:
        auto:
          type: boolean
          description: Whether the release job should be executed automatically (or not).
        options:
          type: array
          description: Options to add in release job / release configuration.
          items:
            type: string
            enum: [backmerge]
