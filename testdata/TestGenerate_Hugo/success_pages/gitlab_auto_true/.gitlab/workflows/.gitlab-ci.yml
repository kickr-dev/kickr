    name: "$CI_JOB_NAME artifacts from $CI_PROJECT_NAME on $CI_COMMIT_REF_SLUG"
    paths:
      - $BUILD_DIR
    expire_in: 1 day

pages:
  stage: deploy
  environment:
    name: $ENV
    action: start
    url: $CI_PAGES_URL
  variables:
    ENV: production
  dependencies:
    - "hugo-build: [.]"
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  script:
    - >
      if [ "$BUILD_DIR" != "public" ]; then
        mkdir -p public
        mv "$BUILD_DIR"/* public
      fi
  artifacts:
    name: "$CI_JOB_NAME artifacts from $CI_PROJECT_NAME on $CI_COMMIT_REF_SLUG"
    paths:
      - public
    expire_in: 1 day
