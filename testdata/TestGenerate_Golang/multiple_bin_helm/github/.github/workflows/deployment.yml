        description: Helm deployment mode.
        type: choice
        options:
          - --dry-run=client
          - --dry-run=none
          - --dry-run=server
          - none
        default: --dry-run=server
      helm_push:
        description: Helm publish mode.
        type: choice
        options:
          - dry-run
          - none
          - full
        default: dry-run
      release:
        description: Release job run mode.
        type: choice
        options:
          - dry-run
          - none
          - release
        default: dry-run

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  run-workflow:
    name: Run
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      # https://docs.stepsecurity.io/harden-runner/workflow-runs
      # https://github.com/marketplace/actions/harden-runner
      - uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
