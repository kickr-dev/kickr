# Code generated by kickr; DO NOT EDIT.

name: Kickr
run-name: Kickr

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  kickr:
    name: Kickr
    runs-on: ubuntu-latest
    environment: kickr
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          check-latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: go install github.com/kickr-dev/kickr/cmd/kickr@beta
      - run: |
          kickr generate
          git status -s
      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          body: "Automated kickr layout generation"
          branch: kickr/layout
          commit-message: "ci(layout): regenerate kickr layout"
          labels: dependencies,kickr
          sign-commits: true
          signoff: true
          title: "ci(layout): regenerate kickr layout"
          token: ${{ secrets.KICKR_TOKEN }}
