# Code generated by kickr; DO NOT EDIT.

name: Kickr
run-name: Kickr

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  kickr:
    name: Kickr
    runs-on: ubuntu-latest
    environment: kickr
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          check-latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: kickr-dev/action-setup@743e6047a045df20b006cc3f02c7b2010ce473de # v0.0.0
        with:
          install-mode: goinstall
          version: beta
      - run: kickr generate
      - uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
          body: "Automated kickr layout generation"
          branch: kickr/layout
          commit-message: "ci(layout): regenerate kickr layout"
          sign-commits: true
          signoff: true
          title: "ci(layout): regenerate kickr layout"
          token: ${{ secrets.KICKR_TOKEN }}
