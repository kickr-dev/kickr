# Code generated by kickr; DO NOT EDIT.

name: Kickr
run-name: Kickr

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  kickr:
    name: Kickr
    runs-on: ubuntu-latest
    environment: kickr
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          check-latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: go install github.com/kickr-dev/kickr/cmd/kickr@beta
      - run: kickr generate
      - uses: peter-evans/create-pull-request@98357b18bf14b5342f975ff684046ec3b2a07725 # v8
        with:
          body: "Automated kickr layout generation"
          branch: kickr/layout
          commit-message: "ci(layout): regenerate kickr layout"
          labels: dependencies,kickr
          sign-commits: true
          signoff: true
          title: "ci(layout): regenerate kickr layout"
          token: ${{ secrets.KICKR_TOKEN }}
