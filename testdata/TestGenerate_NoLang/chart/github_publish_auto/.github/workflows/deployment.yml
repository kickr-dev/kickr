          echo "version=v${DESCRIBE#v}" >> $GITHUB_OUTPUT
      - run: echo ${APP_VERSION}
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}

  helm-push:
    name: Helm Push
    runs-on: ubuntu-latest
