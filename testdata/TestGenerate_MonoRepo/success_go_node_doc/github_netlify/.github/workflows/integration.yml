name: Integration
run-name: Integration

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - alpha
      - beta
      - dev
      - develop
      - next
      - staging
      - main
      - v[0-9]+.x
      - v[0-9]+.[0-9]+.x
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  run-workflow:
    name: Run
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref_protected || !github.event.pull_request.draft }}
    outputs:
      skip: ${{ steps.skip.outputs.skip }}
    permissions:
      pull-requests: read
    steps:
      - id: pull_requests
        if: ${{ github.event_name == 'push' }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          result-encoding: string
          script: |-
            const { data } = await github.rest.pulls.list({
              head: `${context.repo.owner}:${process.env.HEAD}`,
              owner: context.repo.owner,
              repo: context.repo.repo,
            })
            return data.length === 0
        env:
          HEAD: ${{ github.head_ref || github.ref_name }}
      - id: skip
        if: ${{ github.event_name == 'pull_request' || steps.pull_requests.outputs.result == 'true' }}
        run: |-
          echo "Running workflow"
          echo "skip=false" >> $GITHUB_OUTPUT

  go-vulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    if: ${{ needs.run-workflow.outputs.skip == 'false' }}
    needs: run-workflow
    steps:
      - uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          check-latest: true
          go-package: ./...
          go-version-input: '1.23'

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    if: ${{ needs.run-workflow.outputs.skip == 'false' }}
    needs: run-workflow
    permissions:
      pull-requests: write
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          check-latest: true
          go-version: '1.23'
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: mkdir -p reports/
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          args: --config=.golangci.yml --timeout=240s --allow-parallel-runners --output.sarif.path="reports/golangci-lint.sarif" --output.text.path=stdout
          problem-matchers: true
          # renovate: datasource=github-tags packageName=golangci/golangci-lint depName=golangci-lint
          version: v2.8.0
      - if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@cdefb33c0f6224e58673d9004f47f7cb3e328b89 # v4.31.10
        with:
          sarif_file: reports/golangci-lint.sarif
          category: golangci-lint

  go-test:
    name: Go Test
    runs-on: ${{ matrix.os }}
    needs: go-lint
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          check-latest: true
          go-version: '1.23'
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: mkdir -p reports/
      - if: ${{ matrix.os != 'windows-latest' }}
        shell: bash
        run: go test ./... -v -coverpkg="./..." -covermode="count" -coverprofile="reports/go-coverage.native.out" -timeout=30s | tee "reports/tests.log"
      - if: ${{ matrix.os == 'windows-latest' }}
        run: go test ./... -v -coverpkg="./..." -covermode="count" -coverprofile="reports/go-coverage.native.out" -timeout=30s | tee "reports/tests.log"
      - shell: bash
        run: |-
          go run github.com/jstemmer/go-junit-report/v2@latest -in "reports/tests.log" -out "reports/go-test.xunit.xml"
          go tool test2json < "reports/tests.log" > "reports/go-test.native.json"

  node-audit:
    name: Node Audit ${{ matrix.name }}
    runs-on: ubuntu-latest
    if: ${{ needs.run-workflow.outputs.skip == 'false' }}
    needs: run-workflow
    strategy:
      fail-fast: false
      matrix:
        include:
          - directory: docs
            name: (docs)
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # https://github.com/marketplace/actions/setup-bun
      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version-file: package.json
      - run: bun audit
        continue-on-error: true

  node-lint:
    name: Node Lint ${{ matrix.name }}
    runs-on: ubuntu-latest
    if: ${{ needs.run-workflow.outputs.skip == 'false' }}
    needs: run-workflow
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: lint-docs
            directory: docs
            name: (docs)
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # https://github.com/marketplace/actions/setup-bun
      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version-file: package.json
      - run: |-
          mkdir -p reports/
          bun install --frozen-lockfile
          bun run lint -o reports/node-lint.xslint.json -f json

  node-test:
    name: Node Test ${{ matrix.name }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: node-lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: coverage-docs
            directory: docs
            name: (docs)
            os: macos-latest
          - artifact: coverage-docs
            directory: docs
            name: (docs)
            os: ubuntu-latest
          - artifact: coverage-docs
            directory: docs
            name: (docs)
            os: windows-latest
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # https://github.com/marketplace/actions/setup-bun
      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version-file: package.json
      - run: |-
          mkdir -p reports/
          bun install --frozen-lockfile
          bun test --rerun-each 10 --coverage --coverage-reporter=lcov --coverage-dir=reports --reporter=junit --reporter-outfile="reports/node-test.xunit.xml"

  workflow-status:
    name: Status
    runs-on: ubuntu-latest
    if: ${{ always() && (github.event_name != 'pull_request' || !github.event.pull_request.draft) }}
    needs:
      - go-test
      - node-test
    steps:
      - if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'skipped') || contains(needs.*.result, 'cancelled') }}
        run: echo "Some jobs didn't end with success status" && exit 1
      - run: echo "All jobs ended with success"
