name: Integration
run-name: Integration

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - alpha
      - beta
      - dev
      - develop
      - development
      - next
      - staging
      - main
      - master
      - v[0-9]+.x
      - v[0-9]+.[0-9]+.x
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  run-workflow:
    name: Run
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref_protected || !github.event.pull_request.draft }}
    outputs:
      skip: ${{ steps.skip.outputs.skip }}
    permissions:
      pull-requests: read
    steps:
      - id: pull_requests
        if: ${{ github.event_name == 'push' }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          result-encoding: string
          script: |-
            const { data } = await github.rest.pulls.list({
              head: `${context.repo.owner}:${process.env.HEAD}`,
              owner: context.repo.owner,
              repo: context.repo.repo,
            })
            return data.length === 0
        env:
          HEAD: ${{ github.head_ref || github.ref_name }}
      - id: skip
        if: ${{ github.event_name == 'pull_request' || steps.pull_requests.outputs.result == 'true' }}
        run: |-
          echo "Running workflow"
          echo "skip=false" >> $GITHUB_OUTPUT

  pre-commit:
    name: Pre-Commit
    runs-on: ubuntu-latest
    if: ${{ needs.run-workflow.outputs.skip == 'false' }}
    needs: run-workflow
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          # renovate: datasource=github-tags packageName=actions/python-versions
          python-version: 3.13.7
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  node-audit:
    name: Node Audit ${{ matrix.name }}
    runs-on: ubuntu-latest
    if: ${{ needs.run-workflow.outputs.skip == 'false' }}
    needs: run-workflow
    strategy:
      fail-fast: false
      matrix:
        include:
          - directory: .
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      # https://github.com/marketplace/actions/setup-node-js-environment
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          cache: npm
          node-version: lts/*
      - run: npm audit
        continue-on-error: true

  node-lint:
    name: Node Lint ${{ matrix.name }}
    runs-on: ubuntu-latest
    if: ${{ needs.run-workflow.outputs.skip == 'false' }}
    needs: run-workflow
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: lint
            directory: .
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      # https://github.com/marketplace/actions/setup-node-js-environment
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          cache: npm
          node-version: lts/*
      - run: |-
          mkdir -p reports/
          npm ci
          npm run lint -o reports/node-lint.xslint.json -f json

  node-test:
    name: Node Test ${{ matrix.name }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: node-lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: coverage
            directory: .
            os: macos-latest
          - artifact: coverage
            directory: .
            os: ubuntu-latest
          - artifact: coverage
            directory: .
            os: windows-latest
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      # https://github.com/marketplace/actions/setup-node-js-environment
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          cache: npm
          node-version: lts/*
      - run: |-
          mkdir -p reports/
          npm ci
          npm run test -- --coverage --coverageDirectory=reports --reporters="jest-junit" --reporters="jest-sonar"

  workflow-status:
    name: Status
    runs-on: ubuntu-latest
    if: ${{ always() && (github.event_name != 'pull_request' || !github.event.pull_request.draft) }}
    needs:
      - node-test
      - pre-commit
    steps:
      - if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'skipped') || contains(needs.*.result, 'cancelled') }}
        run: echo "Some jobs didn't end with success status" && exit 1
      - run: echo "All jobs ended with success"
