{{/* Code generated by kickr; DO NOT EDIT. */}}

{{- $fullname := include (print .Chart.Name ".fullname") . -}}

{{- range $name, $config := merge .Values.crons .Values.jobs .Values.workers }}
{{- with $config.configMap }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ print $fullname "-" $name }}
data:
{{- range .tpl_folders }}
{{- range $path, $_ := $.Files.Glob (print . "/*") }}
  {{ base $path }}: |-
    {{- tpl ($.Files.Get $path) $config | trimSuffix "\n" | nindent 4 }}
{{- end }}
{{- end }}

{{- range .include_folders }}
{{- range $path, $_ := $.Files.Glob (print . "/*") }}
  {{ base $path }}: |-
    {{- $.Files.Get $path | trimSuffix "\n" | nindent 4 }}
{{- end }}
{{- end }}

{{- with .data }}
  {{- tpl (toYaml .) $config | nindent 2 }}
{{- end }}
{{- end }}
{{- end -}}
