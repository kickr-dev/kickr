# Source: kickr/templates/cronjob.yaml
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kickr-cron-name
  labels:
    helm.sh/chart: kickr-0.1.0
    app.kubernetes.io/name: kickr
    app.kubernetes.io/instance: kickr
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
spec:
  suspend: true
  schedule: "0 0 */1 * *"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 1
  successfulJobsHistoryLimit: 3
  jobTemplate:
    spec:
      completionMode: NonIndexed
      completions: 1
      parallelism: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: kickr
          app.kubernetes.io/instance: kickr
      template:
        metadata:
          labels:
            app.kubernetes.io/name: kickr
            app.kubernetes.io/instance: kickr
        spec:
          serviceAccountName: default
          securityContext:
            {}
          containers:
            - name: cron-name
              securityContext:
                {}
              image: "kickr-dev/kickr:0.1.0"
              env:
                - name: BINARY_NAME
                  value: "cron-name"
                - name: BINARY_PORT
                  value: "3000"
              resources:
                limits:
                  cpu: 250m
                  memory: 256Mi
                requests:
                  cpu: 50m
                  memory: 128Mi
          restartPolicy: OnFailure
