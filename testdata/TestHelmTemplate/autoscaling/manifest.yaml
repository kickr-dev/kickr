---
# Source: kickr/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: kickr-worker-name
  labels:
    helm.sh/chart: kickr-0.1.0
    app.kubernetes.io/name: kickr
    app.kubernetes.io/instance: kickr
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: kickr
    app.kubernetes.io/instance: kickr
---
# Source: kickr/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kickr-worker-name
  labels:
    helm.sh/chart: kickr-0.1.0
    app.kubernetes.io/name: kickr
    app.kubernetes.io/instance: kickr
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
spec:
  paused: true
  selector:
    matchLabels:
      app.kubernetes.io/name: kickr
      app.kubernetes.io/instance: kickr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kickr
        app.kubernetes.io/instance: kickr
    spec:
      serviceAccountName: default
      securityContext:
        {}
      containers:
        - name: worker-name
          securityContext:
            {}
          image: "kickr-dev/kickr:0.1.0"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: BINARY_NAME
              value: "worker-name"
            - name: BINARY_PORT
              value: "3000"
          resources:
            limits:
              cpu: 250m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi
      restartPolicy: Always
---
# Source: kickr/templates/hpa.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kickr-worker-name
  labels:
    helm.sh/chart: kickr-0.1.0
    app.kubernetes.io/name: kickr
    app.kubernetes.io/instance: kickr
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kickr-worker-name
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - resource:
        name: cpu
        target:
          averageUtilization: 60
          type: Utilization
      type: Resource
    - resource:
        name: memory
        target:
          averageUtilization: 60
          type: Utilization
      type: Resource
